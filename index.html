<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>expense-tracker-form-submit</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-highlight: #cedcd8;
      --space-2: 0.5rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-full: 9999px;
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --font-body: 'Satoshi', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--space-6);
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
    }
    .app {
      width: min(100%, 420px);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      padding: var(--space-8) var(--space-6);
      box-shadow: var(--shadow-md);
    }
    h1 { margin: 0 0 var(--space-2); font-size: 2rem; }
    p { margin: 0 0 var(--space-6); color: var(--color-text-muted); }
    .field { margin-bottom: var(--space-4); }
    label { display:block; margin-bottom: var(--space-2); font-weight: 700; }
    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 0 var(--space-4);
      background: transparent;
      color: var(--color-text);
      font-size: 1rem;
    }
    button {
      width: 100%;
      min-height: 48px;
      border: none;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: var(--color-primary-hover); }
    .hint {
      margin-top: var(--space-6);
      padding: 0.9rem 1rem;
      background: var(--color-primary-highlight);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Expense Tracker</h1>
    <p>Enter an expense type and amount, then tap Send.</p>

    <form method="POST" action="https://script.google.com/macros/s/AKfycbwrYCW7BG5uKp597unHFpxIvPVfva07u2bW_Yh8nrua0lBye1myGj3LmVQ6eNWxhETncw/exec">
      <div class="field">
        <label for="expenseType">Expense Type</label>
        <input id="expenseType" name="expenseType" type="text" placeholder="Tea, groceries, fuel" required />
      </div>

      <div class="field">
        <label for="expenseAmount">Expense Amount</label>
        <input id="expenseAmount" name="expenseAmount" type="number" step="0.01" placeholder="20" required />
      </div>

      <button type="submit">Send</button>
    </form>

    <div class="hint">
      Open this file in Notepad and replace <strong>YOUR_WEB_APP_URL_HERE</strong> inside the form <strong>action</strong> with your Apps Script <strong>/exec</strong> URL.
    </div>
  </main>
</body>
</html>
