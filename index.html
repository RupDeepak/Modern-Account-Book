<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense inputs</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f7f6f2;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 90%;
      max-width: 400px;
      background: #ffffff;
      border: 1px solid #d9d9d9;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      color: #222;
    }

    p {
      margin: 0 0 22px;
      color: #666;
      font-size: 16px;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-weight: bold;
      color: #222;
      font-size: 16px;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid #cfcfcf;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: teal;
      box-shadow: 0 0 0 2px rgba(0, 128, 128, 0.15);
    }

    button {
      width: 100%;
      height: 50px;
      margin-top: 22px;
      border: none;
      border-radius: 999px;
      background: teal;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #006d6d;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Expense Tracker</h1>
    <p>Enter an expense type and amount, then tap Send.</p>

    <form method="POST" action="https://script.google.com/macros/s/AKfycbwrYCW7BG5uKp597unHFpxIvPVfva07u2bW_Yh8nrua0lBye1myGj3LmVQ6eNWxhETncw/exec">
      <label for="expenseType">Expense Type</label>
      <input
        id="expenseType"
        name="expenseType"
        type="text"
        placeholder="Tea, groceries, fuel"
        required
      />

      <label for="expenseAmount">Expense Amount</label>
      <input
        id="expenseAmount"
        name="expenseAmount"
        type="number"
        step="0.01"
        placeholder="20"
        required
      />

      <button type="submit">Send</button>
    </form>
  </div>
</body>
</html>
